<!-- ================================================================
   MY FROG CARD — Personal frog identity card
   
   Shows frog avatar with gold frame, emotion badge (top-right),
   frog name, and frog ID code.
   
   Figma node: 225:9155 (MyFrogCard)
   
   Slots:
     - Frog thumbnail image (thumbs/*.webp)
     - Rank badge (badges/*.png)
     - Emotion icon (emotions/*.svg) — Happy, Angry, Hungry, Dead
     - Frog name (e.g. "Frog King")
     - Frog ID (e.g. "#FROG-00C64A")
   
   Usage:
     <div class="my-frog-card">
       <div class="my-frog-card__avatar-area">
         <div class="frog-rental-cell__frog-card">
           <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-king.png" alt="Frog King">
           <div class="frog-rental-cell__frame"></div>
           <img class="frog-rental-cell__badge" src="../assets/badges/KING.png" alt="King badge">
         </div>
         <div class="my-frog-card__emotion">
           <img src="../assets/emotions/Happy.png" alt="Happy">
         </div>
       </div>
       <div class="my-frog-card__info">
         <span class="my-frog-card__name">Frog King</span>
         <span class="my-frog-card__id">#FROG-00C64A</span>
       </div>
     </div>
   ================================================================ -->
