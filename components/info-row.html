<!-- Info Row — Icon + Label + Value -->
<!-- Standard -->
<div class="info-row">
  <img src="../assets/icons/Coin.svg" alt="" class="info-row__icon">
  <span class="info-row__label">Label</span>
  <span class="info-row__value">Value</span>
</div>

<!-- No padding (for modals) -->
<div class="info-row info-row--no-padding">
  <span class="info-row__label">Label</span>
  <span class="info-row__value text-success">Green Value</span>
</div>

<!-- With inline icon + hint -->
<div class="info-row info-row--no-padding">
  <span class="info-row__label">
    <img src="../assets/icons/Chart.svg" alt="" class="info-row__icon-inline">
    Setting Name
    <img src="../assets/icons/Info.svg" alt="" class="info-row__hint">
  </span>
  <span class="info-row__value">
    <label class="toggle-switch">
      <input type="checkbox" checked>
      <span class="toggle-switch__slider"></span>
    </label>
  </span>
</div>
