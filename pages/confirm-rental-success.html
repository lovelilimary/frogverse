<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Frogverse — Rental Success">
  <meta name="theme-color" content="#FDCC34">
  <title>Frogverse — Rented Successfully</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/t0W3XMIZ+HaLayEPQ4/CPZ2eFCrGKH" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@700&family=Inter:wght@400;500;700&family=Alice&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/rental.css">
  <link rel="stylesheet" href="../styles/confirm-rental.css">
</head>
<body>
  <div class="device-simulator">
  <div class="app" id="app">

    <main class="page-shell" id="rentalSuccessPage">
      <div class="game-frame card-content">

            <!-- Header -->
            <div class="card-header card-header--flush">
              <span class="hex-btn" style="visibility:hidden;"></span>
              <h1 class="card-header__title">Rented Successfully</h1>
              <button class="hex-btn" id="btnClose" aria-label="Close">
                <svg class="hex-btn__icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 1L11 11M11 1L1 11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>

            <!-- Selected Frog -->
            <div class="nft-list-item nft-list-item--bordered" data-aos="fade-up">
              <div class="nft-list-item__avatar">
                <img src="../assets/thumbs/avatar.webp" alt="Prince Consort">
              </div>
              <div class="nft-list-item__info">
                <span class="nft-list-item__name">Prince Consort</span>
              </div>
            </div>

            <!-- Order Details -->
            <div class="order-details" data-aos="fade-up" data-aos-delay="100">
              <div class="info-row">
                <img src="../assets/icons/Coin.svg" alt="" class="info-row__icon">
                <span class="info-row__label">Unit Price</span>
                <span class="info-row__value text-primary-orange">120.00 USDT</span>
              </div>
              <div class="info-row">
                <img src="../assets/icons/time1.svg" alt="" class="info-row__icon">
                <span class="info-row__label">Duration</span>
                <span class="info-row__value">365 Days</span>
              </div>
              <div class="info-row">
                <img src="../assets/icons/MoneyBag.svg" alt="" class="info-row__icon">
                <span class="info-row__label">Your Balance</span>
                <span class="info-row__value">10,708.69 USDT</span>
              </div>
              <div class="info-row">
                <img src="../assets/icons/card.svg" alt="" class="info-row__icon">
                <span class="info-row__label">Total Price</span>
                <span class="info-row__value text-primary">50.00 USDT</span>
              </div>
            </div>

            <!-- Great! Button -->
            <button class="game-btn game-btn--green w-full mt-20" data-aos="fade-up" data-aos-delay="200"
              onclick="window.location.href='my-frog.html'">
              <span class="game-btn__text">Great!</span>
            </button>

      </div>
    </main>

  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../scripts/game-btn.js"></script>
  <script src="../scripts/main.js"></script>
  <script>
    // Navigation — Close → Rental page
    document.getElementById('btnClose').addEventListener('click', () => {
      window.location.href = 'rental.html';
    });
  </script>
</body>
</html>
