<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Frogverse — My Frogs">
  <meta name="theme-color" content="#FDCC34">
  <title>Frogverse — My Frogs</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/t0W3XMIZ+HaLayEPQ4/CPZ2eFCrGKH" crossorigin="anonymous">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:wght@700&family=Inter:wght@400;500;700&family=Alice&display=swap"
    rel="stylesheet">

  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Frogverse CSS -->
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/my-frog.css">
</head>

<body>
  <div class="device-simulator">
    <div class="app" id="app">

      <main class="page-shell" id="myFrogPage">

        <!-- ============ CARD CONTAINER ============ -->
        <div class="game-frame card-content" id="myFrogCard">

          <!-- Header: Back + "My Frogs" + Close -->
          <div class="card-header">
            <button class="hex-btn hex-btn--back" id="btnBack" aria-label="Go back">
              <img src="../assets/buttons/HexTech_Back.svg" alt="" class="hex-btn__asset" aria-hidden="true">
            </button>
            <h1 class="card-header__title">My Frogs</h1>
            <button class="hex-btn" id="btnClose" aria-label="Close">
              <img src="../assets/buttons/HexTech_Close.svg" alt="" class="hex-btn__asset" aria-hidden="true">
            </button>
          </div>

          <!-- Tab Bar -->
          <div class="tab-bar" id="tabBar">
            <button class="game-btn game-btn--green tab-btn active" data-tab="active" id="tabActive">
              <span class="game-btn__text">Active (30)</span>
            </button>
            <button class="game-btn game-btn--gray tab-btn" data-tab="abandoned" id="tabAbandoned">
              <span class="game-btn__text">Abandoned (6)</span>
            </button>
          </div>

          <!-- Divider under tabs -->
          <hr class="section-divider mb-16">

          <!-- ============ FROG CARDS GRID ============ -->
          <div class="frog-cards-grid" id="frogCardsGrid">

            <!-- Card 1: Frog King — Hungry (gold frame) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-king.png" alt="Frog King">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer.svg" alt=""></div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner.svg" alt=""></div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/KING.png" alt="King badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Hungry.png" alt="Hungry">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog King</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 2: Frog Queen — Angry (gold frame) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-queen.png" alt="Frog Queen">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer.svg" alt=""></div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner.svg" alt=""></div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/QUEEN.png" alt="Queen badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Angry.png" alt="Angry">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog Queen</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 3: Frog Prince — Happy (silver frame) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card frog-rental-cell__frog-card--silver">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-prince.png" alt="Frog Prince">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer-silver.svg" alt="">
                  </div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner-silver.svg" alt="">
                  </div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/PRINCE.png" alt="Prince badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Happy.png" alt="Happy">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog Prince</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 4: Frog Princess — Hungry (silver frame) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card frog-rental-cell__frog-card--silver">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-princess.png" alt="Frog Princess">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer-silver.svg" alt="">
                  </div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner-silver.svg" alt="">
                  </div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/PRINCESS.png" alt="Princess badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Hungry.png" alt="Hungry">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog Princess</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 5: Frog Consort — Angry (silver frame) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card frog-rental-cell__frog-card--silver">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-consort.png" alt="Frog Consort">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer-silver.svg" alt="">
                  </div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner-silver.svg" alt="">
                  </div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/CONSORT.png" alt="Consort badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Angry.png" alt="Angry">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog Consort</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 6: Frog King — Happy (gold frame, duplicate) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-king.png" alt="Frog King">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer.svg" alt=""></div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner.svg" alt=""></div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/KING.png" alt="King badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Happy.png" alt="Happy">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog King</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

            <!-- Card 7: Frog King — Happy (gold frame, duplicate) -->
            <div class="my-frog-card">
              <div class="my-frog-card__avatar-area">
                <div class="frog-rental-cell__frog-card">
                  <img class="frog-rental-cell__thumb" src="../assets/thumbs/avt-king.png" alt="Frog King">
                  <div class="frog-rental-cell__frame-outer"><img src="../assets/frog-frame-outer.svg" alt=""></div>
                  <div class="frog-rental-cell__frame-inner"><img src="../assets/frog-frame-inner.svg" alt=""></div>
                  <img class="frog-rental-cell__badge" src="../assets/badges/KING.png" alt="King badge">
                </div>
                <div class="my-frog-card__emotion">
                  <img src="../assets/emotions/Happy.png" alt="Happy">
                </div>
              </div>
              <div class="my-frog-card__info">
                <span class="my-frog-card__name">Frog King</span>
                <span class="my-frog-card__id">#FROG-00C64A</span>
              </div>
            </div>

          </div>
          <!-- /.frog-cards-grid -->

        </div>

      </main>

    </div>
  </div> <!-- /.device-simulator -->

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <!-- AOS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- Frogverse JS -->
  <script src="../scripts/game-btn.js"></script>
  <script src="../scripts/main.js"></script>
  <script>
    // Navigation — Back & Close
    document.getElementById('btnBack').addEventListener('click', () => {
      history.back();
    });
    document.getElementById('btnClose').addEventListener('click', () => {
      window.location.href = 'home.html';
    });

    // Frog cards → Detail page
    document.querySelectorAll('.my-frog-card').forEach(card => {
      card.style.cursor = 'pointer';
      card.addEventListener('click', () => {
        window.location.href = 'my-frog-detail.html';
      });
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active');
          b.classList.remove('game-btn--green');
          b.classList.add('game-btn--gray');
        });
        btn.classList.add('active');
        btn.classList.remove('game-btn--gray');
        btn.classList.add('game-btn--green');
      });
    });
  </script>
</body>

</html>
