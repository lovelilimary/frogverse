<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Frogverse — Loading">
  <meta name="theme-color" content="#FDCC34">
  <title>Frogverse — Loading</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/t0W3XMIZ+HaLayEPQ4/CPZ2eFCrGKH" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@700&family=Inter:wght@400;500;700&family=Alice&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/loading.css">
</head>
<body>
  <div class="device-simulator">
  <div class="app" id="app">

    <!-- ============ STAGE 1: RED CURTAIN ============ -->
    <div class="loading-stage" id="stageCurtain">
      <div class="curtain">
        <div class="curtain__left"></div>
        <div class="curtain__right"></div>
        <div class="curtain__valance">
          <svg class="curtain__valance-svg" viewBox="0 0 402 60" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <path d="M0 0H402V30C370 55 330 60 300 50C270 40 230 55 201 60C170 55 130 40 100 50C70 60 30 55 0 30V0Z" fill="#8B1A1A"/>
            <path d="M0 0H402V25C370 50 330 55 300 45C270 35 230 50 201 55C170 50 130 35 100 45C70 55 30 50 0 25V0Z" fill="#C62828"/>
          </svg>
          <div class="curtain__rope"></div>
        </div>
      </div>
    </div>

    <!-- ============ STAGE 2: BLURRED THRONE + LOGO ============ -->
    <div class="loading-stage" id="stageBlur" style="opacity:0;">
      <div class="loading-bg loading-bg--blurred">
        <img src="../assets/bg-main.webp" alt="" class="loading-bg__img" aria-hidden="true">
      </div>
      <div class="loading-logo loading-logo--center">
        <img src="../assets/logo.webp" alt="Frogverse" class="loading-logo__img">
      </div>
    </div>

    <!-- ============ STAGE 3 & 4: FROG CHARACTERS + LOGO + LOADING ============ -->
    <div class="loading-stage" id="stageFrogs" style="opacity:0;">
      <div class="loading-bg">
        <img src="../assets/Main image.webp" alt="" class="loading-bg__img loading-bg__img--frogs" aria-hidden="true">
      </div>
      <div class="loading-logo loading-logo--top">
        <img src="../assets/logo.webp" alt="Frogverse" class="loading-logo__img">
      </div>
      <div class="loading-text" id="loadingText" style="opacity:0;">
        <span class="loading-text__label">Loading...</span>
      </div>
    </div>

  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // Animated loading sequence
    const tl = gsap.timeline();

    // Stage 1: Show curtain (1.5s), then open curtains
    tl.to('#stageCurtain .curtain__left', {
      x: '-100%', duration: 1.2, ease: 'power2.inOut', delay: 1.5
    })
    .to('#stageCurtain .curtain__right', {
      x: '100%', duration: 1.2, ease: 'power2.inOut'
    }, '<')
    .to('#stageCurtain .curtain__valance', {
      y: '-100%', duration: 0.8, ease: 'power2.in'
    }, '-=0.6')

    // Stage 2: Fade in blurred throne + logo
    .to('#stageBlur', {
      opacity: 1, duration: 0.6, ease: 'power1.inOut'
    }, '-=0.4')
    .to('#stageCurtain', {
      opacity: 0, duration: 0.3
    }, '-=0.3')

    // Stage 3: After 1.5s, transition to frogs
    .to('#stageFrogs', {
      opacity: 1, duration: 0.8, ease: 'power1.inOut', delay: 1.5
    })
    .to('#stageBlur', {
      opacity: 0, duration: 0.5
    }, '-=0.5')

    // Stage 4: Show "Loading..." text
    .to('#loadingText', {
      opacity: 1, duration: 0.5, ease: 'power1.inOut', delay: 0.8
    });
  </script>
</body>
</html>
